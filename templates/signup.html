{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>
    <link rel="stylesheet" href="{% static "signup.css"%}">
</head>
<body>

<div class="form-container">

    <h2>Sign In</h2>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form class="anime-form" method="POST" action="/signup/">

        {% csrf_token %}

        <input type="text" name="username" placeholder="Enter Name" required>

        <input type="email" name="email" placeholder="Enter MES Email" required>

        <input type="password" name="password" placeholder="Enter Password" required>

        <button type="submit">Done</button>

    </form>
    {% if success %}
        <p style="color: green;">Signed in successfully, kindly login now  </p>
      {% endif %}

</div>

</body>
</html>
